<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edinaldo : SketchRoom</title>

    <meta name="description" content="Galeria de artes e ilustrações.">
    <meta name="theme-color" content="#ffffff">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- ====================================================== -->
    <!-- HEADER -->
    <!-- ====================================================== -->

    <header class="hero">

        <div class="profile">

            <img
                src="assets/img/usuario.jpg"
                alt="Foto do artista"
                class="profile-image">

            <h1>Edinaldo Cicero</h1>

            <p class="subtitle">
                Desenhista, Digital Artist, Programador e Criador de jogos.
            </p>

            <p class="description">
                Bem-vindo à minha pequena galeria digital.
                Aqui você encontrará ilustrações, fanarts,
                sketches e projetos pessoais.
            </p>

        </div>

    </header>

    <!-- ====================================================== -->
    <!-- MAIN -->
    <!-- ====================================================== -->

    <main>

        <section class="gallery-section">

            <h2>
                Galeria
            </h2>

            <div class="gallery" id="gallery">

                <!-- ================================================= -->
                <!-- CARD -->
                <!-- Basta copiar este bloco para adicionar outra arte -->
                <!-- ================================================= -->
            </div>

        </section>

    </main>

    <!-- ====================================================== -->
    <!-- MODAL -->
    <!-- ====================================================== -->

    <div class="modal" id="artModal">

        <div class="modal-content">

            <button class="close-modal">

                &times;

            </button>

            <img
                id="modalImage"
                src=""
                alt="Imagem da Arte">

            <div class="modal-info">

                <h2 id="modalTitle"></h2>

                <p id="modalDescription"></p>

                <div class="art-details">

                    <span id="modalDate"></span>

                    <span id="modalSoftware"></span>

                </div>

                <div id="modalTags">

                </div>

            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- FOOTER -->
    <!-- ====================================================== -->

    <footer>

        <p>

            © 2026 ÁtomoGames

        </p>

    </footer>

    <!-- ====================================================== -->
    <!-- JAVASCRIPT -->
    <!-- ====================================================== -->

    <script src="js/gallery.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
